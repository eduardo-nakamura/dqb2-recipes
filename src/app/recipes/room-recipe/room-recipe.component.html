<h2>Room Recipes</h2>
<div>
    <input [(ngModel)]="showHideBedroom" type="checkbox"> Bedrooms
</div>
<div>
    <input [(ngModel)]="showHideBathroom" type="checkbox"> Bathrooms
</div>
<div>
    <input [(ngModel)]="showHideKitchen" type="checkbox"> Kitchen and Dining Room
</div>
<div>
    <input [(ngModel)]="showHidePrivateBedrooms" type="checkbox"> Private Bedroom
</div>
<div>
    <input [(ngModel)]="showHideBar" type="checkbox"> Bar
</div>
<div>
    <input [(ngModel)]="showHideToilets" type="checkbox"> Toilet
</div>
<div>
    <input [(ngModel)]="showHideChangingRoom" type="checkbox"> Changing gRoom
</div>
<section *ngIf="showHideBedroom">
    <h3>Bedrooms</h3>
    <table mat-table [dataSource]="bedroomTable" matSort class="mat-elevation-z8 w-100">

        <!-- Position Column -->
        <ng-container matColumnDef="number">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> No. </th>
            <td mat-cell *matCellDef="let element"> {{element.number}} </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <!-- Weight Column -->
        <ng-container matColumnDef="content">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Components </th>
            <td mat-cell *matCellDef="let element"> {{element.content}} </td>
        </ng-container>



        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

</section>
<section *ngIf="showHideBathroom">2</section>
<section *ngIf="showHideKitchen">3</section>
<section *ngIf="showHidePrivateBedrooms">4</section>
<section *ngIf="showHideBar">5</section>
<section *ngIf="showHideToilets">6</section>
<section *ngIf="showHideChangingRoom">
    <h2>Changing Room</h2>
</section>
